---
layout: default
---

<div id="search-container">
  <input type="text" id="project-search-input" placeholder="Search projects..." onkeyup="filterProjects()">
</div>

<div class="posts" id="projects-list">
  {% assign sorted_projects = site.projects | sort: "date" | reverse %}
  {% for project in sorted_projects %}
    <article class="post" data-title="{{ project.title | downcase }}" data-content="{{ content | strip_html | downcase }}">
      <h1><a href="{{ project.project_url }}" target="_blank">{{ project.title }}</a></h1>

      <div class="date">
        Created on {{ project.date | date: "%B %e, %Y" }}
      </div>

      <div class="links">
        <a href="{{ project.project_url }}" target="_blank" class="read-more">View Project</a> | 
        <a href="{{ site.baseurl }}{{ project.url }}" class="read-more">Read More</a>
      </div>
    </article>
  {% endfor %}
</div>

<div id="no-results-projects" style="display: none;">No projects found.</div>

<script>
function filterProjects() {
  const input = document.getElementById('project-search-input');
  const filter = input.value.toLowerCase();
  const posts = document.getElementById('projects-list').getElementsByTagName('article');
  let hasResults = false;
  
  for (let i = 0; i < posts.length; i++) {
    const title = posts[i].getAttribute('data-title');
    
    if (title.indexOf(filter) > -1) {
      posts[i].style.display = '';
      hasResults = true;
    } else {
      posts[i].style.display = 'none';
    }
  }
  
  const noResults = document.getElementById('no-results-projects');
  if (!hasResults && filter.length > 0) {
    noResults.style.display = 'block';
  } else {
    noResults.style.display = 'none';
  }
}
</script>
