<!DOCTYPE html>
<html>
  <head>
    <title>
      {% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{
      site.description }}
    </title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link
      rel="stylesheet"
      type="text/css"
      href="{{ site.baseurl }}/style.css"
    />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="{{ site.name }} - {{ site.description }}"
      href="{{ site.baseurl }}/feed.xml"
    />

    <!-- Created with Jekyll Now - http://github.com/barryclark/jekyll-now -->
  </head>

  <body>
    <div class="wrapper-masthead">
      <div class="container">
        <header class="masthead clearfix">
          <!-- <a href="{{ site.baseurl }}/" class="site-avatar"
            ><img src="{{ site.avatar }}"
          /></a> -->

          <div class="site-info">
            <h1 class="site-name">
              <a href="{{ site.baseurl }}/">{{ site.name }}</a>
            </h1>
            <p class="site-description">{{ site.description }}</p>
          </div>

          <nav>
            <a href="{{ site.baseurl }}/">Blog</a>
            <a href="{{ site.baseurl }}/about">About</a>
            <a href="{{site.baseurl}}/projects">Projects</a>
						<a href="{{site.baseurl}}/games">Games</a>
          </nav>
        </header>
      </div>
    </div>

    <div id="main" role="main" class="container">{{ content }}</div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">{% include svg-icons.html %}</footer>
      </div>
    </div>

    {% include analytics.html %}

    <script>
      // Check for saved dark mode preference or system preference
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const isDarkMode = localStorage.getItem('darkMode') === 'true';
      
      if (isDarkMode || (!localStorage.getItem('darkMode') && prefersDark)) {
        document.body.classList.add('dark-mode');
      }

      // Create toggle switch
      function createDarkModeToggle() {
        const toggle = document.createElement('div');
        toggle.id = 'dark-mode-toggle';
        toggle.className = 'dark-mode-toggle';
        toggle.setAttribute('role', 'switch');
        toggle.setAttribute('aria-checked', 'false');
        
        const moonIcon = '<img src="{{ site.baseurl }}/images/moon.png" class="toggle-icon moon-icon" alt="moon">';
        const sunIcon = '<img src="{{ site.baseurl }}/images/sunny.png" class="toggle-icon sun-icon" alt="sun">';
        
        toggle.innerHTML = moonIcon + sunIcon;
        return toggle;
      }

      const toggleSwitch = createDarkModeToggle();
      document.querySelector('footer').appendChild(toggleSwitch);

      // Toggle dark mode
      toggleSwitch.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDark.toString());
        
        if (isDark) {
          toggleSwitch.classList.add('dark-mode');
          toggleSwitch.setAttribute('aria-checked', 'true');
        } else {
          toggleSwitch.classList.remove('dark-mode');
          toggleSwitch.setAttribute('aria-checked', 'false');
        }
      });

      // Initialize switch state
      if (document.body.classList.contains('dark-mode')) {
        toggleSwitch.classList.add('dark-mode');
        toggleSwitch.setAttribute('aria-checked', 'true');
      }
    </script>
  </body>
</html>
