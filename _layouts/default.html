<!DOCTYPE html>
<html>
  <head>
    <title>
      {% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{
      site.description }}
    </title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link
      rel="stylesheet"
      type="text/css"
      href="{{ site.baseurl }}/style.css"
    />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="{{ site.name }} - {{ site.description }}"
      href="{{ site.baseurl }}/feed.xml"
    />

    <!-- Created with Jekyll Now - http://github.com/barryclark/jekyll-now -->
  </head>

  <body>
    <div class="wrapper-masthead">
      <div class="container">
        <header class="masthead clearfix">
          <!-- <a href="{{ site.baseurl }}/" class="site-avatar"
            ><img src="{{ site.avatar }}"
          /></a> -->

          <div class="site-info">
            <h1 class="site-name">
              <a href="{{ site.baseurl }}/">{{ site.name }}</a>
            </h1>
            <p class="site-description">{{ site.description }}</p>
          </div>

          <nav>
            <a href="{{ site.baseurl }}/">Blog</a>
            <a href="{{ site.baseurl }}/about">About</a>
            <a href="{{site.baseurl}}/projects">Projects</a>
						<a href="{{site.baseurl}}/games">Games</a>
          </nav>
        </header>
      </div>
    </div>

    <div id="main" role="main" class="container">{{ content }}</div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">{% include svg-icons.html %}</footer>
      </div>
    </div>

    {% include analytics.html %}

    <script>
      // Check for saved dark mode preference or system preference
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const isDarkMode = localStorage.getItem('darkMode') === 'true';
      
      if (isDarkMode || (!localStorage.getItem('darkMode') && prefersDark)) {
        document.body.classList.add('dark-mode');
      }

      // Create toggle button
      function createDarkModeToggle() {
        const btn = document.createElement('button');
        btn.id = 'dark-mode-toggle';
        btn.className = 'dark-mode-btn';
        btn.setAttribute('aria-label', 'Toggle dark mode');
        btn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>';
        btn.style.cssText = 'position:fixed;top:20px;right:20px;background:none;border:2px solid #333;padding:10px 15px;border-radius:8px;cursor:pointer;z-index:9999;font-size:16px;line-height:1;transition:all 0.3s ease;';
        return btn;
      }

      const toggleBtn = createDarkModeToggle();
      document.body.appendChild(toggleBtn);

      // Toggle dark mode
      toggleBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDark.toString());
        toggleBtn.style.borderColor = isDark ? '#fff' : '#333';
      });

      // Initialize button border color
      if (document.body.classList.contains('dark-mode')) {
        toggleBtn.style.borderColor = '#fff';
      }
    </script>
  </body>
</html>
